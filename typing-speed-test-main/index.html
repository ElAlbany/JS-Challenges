<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Typing Speed Test</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="assets/images/logo-small.svg" alt="logo-small.svg" />
      <section class="display-best-score">
        <img src="assets/images/icon-personal-best.svg" alt="" />
        <div>
          <p>
            <span class="personal-best"
              ><span id="personal-word">Personal</span> best:</span
            >
            <span id="best-score-number">92</span> WPM
          </p>
        </div>
      </section>
    </div>

    <div class="results">
      <section class="result-section">
        <p class="display-word">WPM:</p>
        <p id="wpn-number">40</p>
      </section>
      <section class="result-section">
        <p class="display-word">Accuracy:</p>
        <p id="accuracy">94%</p>
      </section>
      <section class="result-section">
        <p class="display-word">Time:</p>
        <p id="time">0:46</p>
      </section>
    </div>

    <div class="input-container">
      <!-- selecting difficulty level combo -->
      <div class="custom-combo" id="combo1">
        <div class="difficulty" id="difficulty1">
          <span class="difficulty-value" id="value1">Easy</span>
          <img src="assets/images/icon-down-arrow.svg" alt="" />
        </div>

        <div class="dropdown-menu">
          <div class="option selected">
            <span class="radio-style"></span>
            <span class="option-value">Easy</span>
          </div>

          <div class="option">
            <span class="radio-style"></span>
            <span class="option-value">Medium</span>
          </div>

          <div class="option">
            <span class="radio-style"></span>
            <span class="option-value">Hard</span>
          </div>
        </div>
      </div>

      <!-- selecting mode combo -->

      <div class="custom-combo" id="combo2">
        <div class="difficulty" id="difficulty2">
          <span class="difficulty-value" id="value2">Timed (60s)</span>
          <img src="assets/images/icon-down-arrow.svg" alt="" />
        </div>

        <div class="dropdown-menu">
          <div class="option selected">
            <span class="radio-style"></span>
            <span class="option-value">Timed (60s)</span>
          </div>

          <div class="option">
            <span class="radio-style"></span>
            <span class="option-value">Passage</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Passage -->

    <!-- Start Typing Test
  Or click the text and start typing -->

    <!-- Test Complete!
  Solid run. Keep pushing to beat your high score. -->

    <!-- Go Again -->

    <!-- Test Complete End -->

    <script src="script.js"></script>
  </body>
</html>
